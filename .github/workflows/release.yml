name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          install-mode: binary
          skip-cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.21.0

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Generate Homebrew tap token
        id: homebrew-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3948556
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: podplane
          repositories: homebrew-tap

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.homebrew-token.outputs.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish container image
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"

          rm -rf .release-image
          mkdir -p .release-image/linux/amd64 .release-image/linux/arm64

          amd64_binary="$(find dist -type f -name ocimage -path '*linux_amd64*' | head -n 1)"
          arm64_binary="$(find dist -type f -name ocimage -path '*linux_arm64*' | head -n 1)"

          test -n "$amd64_binary" || { echo "linux/amd64 ocimage binary not found in dist"; exit 1; }
          test -n "$arm64_binary" || { echo "linux/arm64 ocimage binary not found in dist"; exit 1; }

          cp "$amd64_binary" .release-image/linux/amd64/ocimage
          cp "$arm64_binary" .release-image/linux/arm64/ocimage
          cp Containerfile .release-image/Containerfile
          chmod +x .release-image/linux/amd64/ocimage .release-image/linux/arm64/ocimage

          .release-image/linux/amd64/ocimage build \
            --platform linux/amd64,linux/arm64 \
            -t "ghcr.io/podplane/ocimage:${version}" \
            -t ghcr.io/podplane/ocimage:latest \
            --push \
            .release-image
